name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build frontend
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Add SSH key to agent
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts || true
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: SSH and deploy backend
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" << 'EOF'
            cd ~/medicaid
            # Preserve .env before git clean removes it
            cp .env .env.backup 2>/dev/null || true

            git fetch --prune origin main
            git reset --hard origin/main
            git clean -fd

            # Restore .env after git clean
            cp .env.backup .env 2>/dev/null || true

            # Start backend services (docker compose handles BE + DB)
            docker compose up -d --build
          EOF
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      - name: Sync frontend build
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" "mkdir -p ~/medicaid/client/dist"
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=accept-new" client/dist/ "$SSH_USER@$SSH_HOST:~/medicaid/client/dist/"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      - name: Verify backend
        run: |
          curl -sf http://$SSH_HOST:8078/health
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Verify frontend dist exists
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" "ls -la ~/medicaid/client/dist/index.html"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
