version: "3.9"
services:
  db:
    image: postgres:16
    container_name: ewc_medicaid_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ewc_medicaid
    ports:
      - "5432:5432"
    volumes:
      - ewc_medicaid_data:/var/lib/postgresql/data
volumes:
  ewc_medicaid_data:
