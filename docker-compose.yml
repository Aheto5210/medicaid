services:
  server:
    build: ./server
    ports:
      - "4045:4000"
    env_file: ./server/.env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - ewc-medicaid:/var/libs/postgresql/data


volumes:
  ewc-medicaid:
